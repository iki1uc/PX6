<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>TIME 3×11 – Scroll + Zoom</title>

<meta name="signature" content="IKI1UC-TIME-3x11">
<meta name="respo-id" content="60000-TIME311">

<style>
body {
  background:#000;
  color:#0f0;
  font-family:monospace;
  padding:20px;
}

#wrap {
  width:90%;
  margin:auto;
  overflow:hidden;
  border:1px solid #333;
  padding:10px;
}

#grid {
  display:grid;
  grid-template-columns:repeat(11,80px);
  gap:4px;
  transition:transform 0.2s ease;
}

.cell {
  background:#111;
  border:1px solid #333;
  padding:10px;
  text-align:center;
}

button {
  background:#111;
  color:#0f0;
  border:1px solid #333;
  padding:8px 16px;
  margin:10px 4px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>TIME 3×11 – Scroll + Zoom</h1>

<div id="wrap">
  <div id="grid"></div>
</div>

<button onclick="zoomIn()">ZOOM +</button>
<button onclick="zoomOut()">ZOOM −</button>
<button onclick="resetZoom()">RESET</button>

<script>
const grid = document.getElementById("grid");
let zoom = 1.0;

// === 3×11 GRID GENERATION ==========================================
function buildGrid(){
  grid.innerHTML = "";
  for(let r=0; r<3; r++){
    for(let c=0; c<11; c++){
      const div = document.createElement("div");
      div.className = "cell";
      div.textContent = `R${r+1}C${c+1}`;
      grid.appendChild(div);
    }
  }
}

// === ZOOM ENGINE ====================================================
function zoomIn(){
  zoom += 0.1;
  grid.style.transform = `scale(${zoom})`;
}

function zoomOut(){
  zoom -= 0.1;
  if(zoom < 0.2) zoom = 0.2;
  grid.style.transform = `scale(${zoom})`;
}

function resetZoom(){
  zoom = 1.0;
  grid.style.transform = `scale(${zoom})`;
}

// === SCROLL ENGINE ==================================================
document.getElementById("wrap").addEventListener("wheel", e => {
  e.preventDefault();
  grid.scrollLeft += e.deltaY;
});

// === INIT ===========================================================
buildGrid();
resetZoom();
</script>

</body>
</html>
