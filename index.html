<section>
<h2>PX6 RUN</h2>
<input id="inp" type="number" value="1" step="0.01">
<button onclick="runPX6()">RUN</button>
<pre id="px6out">Bereit...</pre>
</section>

<section>
<h2>TOOLOMAT · GRID (me4 / in4 / run4 / me2 / in2 / u4)</h2>

<script>
// PX6 RUNNER (minimal)
function runPX6(){
  const x = parseFloat(inp.value);
  const p3 = PX3(x);
  const p4 = PX4(p3);
  const p6 = PX6(p4);

  px6out.textContent =
`PX6 – RESULT

Input: ${x}

PX3 = ${p3}
PX4 = ${p4}
PX6 = ${p6}

FINAL = ${p6}`;
}
</script>
